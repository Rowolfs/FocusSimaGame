<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Focusima</title>
  <link rel="shortcut icon" href="TemplateData/favicon.ico">
  <style>
    :root {
      --bg: #0f0f10;
      --panel: #171718;
      --panel-2: #202124;
      --text: #f3f1ea;
      --muted: #bdb6aa;
      --accent: #9bc8ad;
      --accent-strong: #86b99b;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(155,200,173,0.12), transparent 30%),
        linear-gradient(180deg, #111214 0%, #0c0d0f 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    #app-shell {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 16px;
    }

    #unity-frame {
      position: relative;
      width: min(100vw - 32px, calc((100vh - 32px) * 9 / 16));
      height: min(100vh - 32px, calc((100vw - 32px) * 16 / 9));
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    #unity-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      outline: none;
    }

    #unity-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    #topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px;
      pointer-events: none;
    }

    #brand-chip,
    #hint-chip {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.54);
      color: rgba(255,255,255,0.94);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 14px;
      line-height: 1;
    }

    #hint-chip {
      color: rgba(255,255,255,0.78);
      font-size: 13px;
    }

    #bottom-ui {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      padding: 14px;
      pointer-events: none;
    }

    #status-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
      max-width: 70%;
      pointer-events: auto;
    }

    #unity-loading-card,
    #unity-warning {
      border-radius: 18px;
      background: rgba(20, 20, 20, 0.66);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 14px;
    }

    #unity-loading-card {
      min-width: 220px;
    }

    #loading-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 120ms linear;
    }

    #unity-warning {
      display: none;
      color: #fff;
      font-size: 13px;
      line-height: 1.45;
    }

    #controls {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    .overlay-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(20,20,20,0.66);
      color: white;
      border-radius: 999px;
      min-height: 46px;
      min-width: 46px;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    .overlay-btn:hover {
      transform: translateY(-1px);
      background: rgba(32,32,32,0.78);
      border-color: rgba(255,255,255,0.22);
    }

    .overlay-btn:active {
      transform: translateY(0);
    }

    .overlay-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    #tap-capture {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 2;
      cursor: default;
    }

    #tap-capture.hidden {
      display: none;
    }

    @media (max-width: 640px) {
      #app-shell {
        padding: 0;
      }

      #unity-frame {
        width: min(100vw, calc(100vh * 9 / 16));
        height: min(100vh, calc(100vw * 16 / 9));
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      #hint-chip {
        display: none;
      }

      #status-wrap {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div id="app-shell">
    <div id="unity-frame">
      <canvas id="unity-canvas" width="1080" height="1920" tabindex="0"></canvas>
      <div id="tap-capture" aria-hidden="true"></div>

      <div id="unity-overlay">

        <div id="bottom-ui">
          <div id="status-wrap">
            <div id="unity-loading-card">
              <div id="loading-title">Загрузка...</div>
              <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
              </div>
            </div>
            <div id="unity-warning"></div>
          </div>


        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#unity-canvas");
    const frame = document.querySelector("#unity-frame");
    const loadingCard = document.querySelector("#unity-loading-card");
    const warningBanner = document.querySelector("#unity-warning");
    const focusButton = document.querySelector("#focus-button");
    const fullscreenButton = document.querySelector("#unity-fullscreen-button");
    const tapCapture = document.querySelector("#tap-capture");

    function unityShowBanner(msg, type) {
      const div = document.createElement("div");
      div.textContent = msg;
      div.style.padding = "10px 12px";
      div.style.borderRadius = "12px";
      div.style.marginTop = "8px";
      div.style.background = type === "error"
        ? "rgba(180, 40, 40, 0.88)"
        : "rgba(180, 140, 40, 0.88)";
      warningBanner.appendChild(div);
      warningBanner.style.display = "block";

      if (type !== "error") {
        setTimeout(() => {
          if (div.parentNode) div.parentNode.removeChild(div);
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }, 5000);
      }
    }

    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/web.loader.js";

    const config = {
      arguments: [],
      dataUrl: buildUrl + "/web.data.unityweb",
      frameworkUrl: buildUrl + "/web.framework.js.unityweb",
      codeUrl: buildUrl + "/web.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Focusima",
      productVersion: "0.1.0",
      showBanner: unityShowBanner,
      matchWebGLToCanvasSize: false,
      devicePixelRatio: 1
    };

    function focusCanvas() {
      window.focus();
      canvas.focus({ preventScroll: true });
    }

    function resizeUnityCanvas() {
      const rect = frame.getBoundingClientRect();
      const scale = 1;
      canvas.width = Math.round(rect.width * scale);
      canvas.height = Math.round(rect.height * scale);
      focusCanvas();
    }

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      const meta = document.querySelector('meta[name="viewport"]');
      meta.setAttribute(
        "content",
        "width=device-width, height=device-height, initial-scale=1, viewport-fit=cover, user-scalable=no"
      );
    }

    focusButton.addEventListener("click", focusCanvas);
    tapCapture.addEventListener("pointerdown", focusCanvas);
    canvas.addEventListener("pointerdown", focusCanvas);
    canvas.addEventListener("click", focusCanvas);
    document.addEventListener("mousedown", () => window.focus());

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      createUnityInstance(canvas, config, (progress) => {
        document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
      }).then((unityInstance) => {
        resizeUnityCanvas();
        window.addEventListener("resize", resizeUnityCanvas);

        fullscreenButton.onclick = () => {
          unityInstance.SetFullscreen(1);
          setTimeout(() => {
            resizeUnityCanvas();
            focusCanvas();
          }, 300);
        };

        loadingCard.style.display = "none";
        tapCapture.classList.add("hidden");

        focusCanvas();
        setTimeout(focusCanvas, 150);
        setTimeout(focusCanvas, 600);
      }).catch((message) => {
        alert(message);
      });
    };

    document.body.appendChild(script);
  </script>
</body>
</html>
